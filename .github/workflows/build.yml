name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip source
        run: unzip GensparkHybridPremium-watchface-source-v2.zip

      - name: Build APK
        run: |
          cd galaxywatch7_premium
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: watchface-apk
          path: galaxywatch7_premium/watchface/build/outputs/apk/debug/*.apk
